name: Cross-Platform Smoke

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.28.2'

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Cubism assets
        uses: actions/cache@v4
        with:
          path: |
            .generated/cubism-framework
            public/lib/live2dcubismcore.min.js
          key: cubism-assets-${{ hashFiles('package.json') }}

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Package unpacked app
        run: pnpm run build:dir:fast
